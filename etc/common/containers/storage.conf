[storage]
driver = "overlay"

[storage.options.pull_options]
enable_partial_images = "true"
use_hard_links = "true"
convert_images = "true"

[storage.options.overlay]
mountopt = "nodev,nosuid,metacopy=on"
use_composefs = "true"
